name: Backend CI/CD Pipeline

on:
  push:
    branches: [ main ]
    paths: [ 'backend/**' ]
  pull_request:
    branches: [ main ]
    paths: [ 'backend/**' ]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  test:
    name: Run Backend Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]

    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: ./backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  deploy:
    name: Deploy to AWS Elastic Beanstalk
    runs-on: ubuntu-latest
    needs: test          # deploy vasta testien jälkeen
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Dependencies & Run Tests (safety check)
        working-directory: ./backend
        run: |
          npm ci
          npm test

      - name: Create Deployment Package
        working-directory: ./backend
        run: |
          zip -r deploy.zip . -x "node_modules/*" "*.git*" "tests/*"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::318542846215:role/putkilo
          aws-region: eu-north-1

      - name: Deploy to Elastic Beanstalk
        run: |
          aws elasticbeanstalk create-application-version \
            --application-name GymBroApp \
            --version-label "github-action-${{ github.sha }}" \
            --source-bundle S3Bucket=${{ secrets.BUCKET_NAME }},S3Key=backend/deploy.zip

          aws elasticbeanstalk update-environment \
            --environment-name GymBroEnv \
            --version-label "github-action-${{ github.sha }}"