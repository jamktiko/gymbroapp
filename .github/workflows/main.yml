name: Test Backend

on:
  push:
    branches: [ main ]
    paths: [ 'backend/**' ]          # Ajetaan vain jos backend-kansio muuttuu
  pull_request:
    branches: [ main ]
    paths: [ 'backend/**' ]
jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]

    defaults:
      run:
        working-directory: ./backend     # ← TÄMÄ on tärkein! Kaikki run-stepit ajetaan tässä kansiossa

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: ./backend/package-lock.json   # Kerrotaan missä lockfile on

      - name: Install dependencies
        run: npm ci

      - name: Run backend tests
        run: npm test
