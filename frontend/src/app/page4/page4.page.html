<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/page2"></ion-back-button>
    </ion-buttons>
    <ion-title>Uusi treeniohjelma</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <div class="content-container ion-padding">
    <ion-item lines="full">
      <ion-label position="stacked">Ohjelman nimi</ion-label>
      <ion-input 
        [(ngModel)]="treeniNimi" 
        type="text" 
        placeholder="esim. Tappotreeni">
      </ion-input>
    </ion-item>

    <div class="ion-padding-top">
      <ion-button expand="block" color="primary" (click)="tallenna()">
        Tallenna ohjelma
      </ion-button>
    </div>
  </div>
</ion-content>
