<ion-app>
  <ion-split-pane contentId="main-content">
    <ion-menu side="end" contentId="main-content" type="overlay">
      <ion-content>
        <ion-list id="inbox-list">
          <ion-list-header>{{ userDisplayName }}</ion-list-header>
          <ion-note>{{ userEmail }}</ion-note>

          <ion-menu-toggle auto-hide="false">
            @for (p of appPages; track p; let i = $index) {
            <ion-item routerDirection="root" [routerLink]="[p.url]" lines="none" detail="false"
              routerLinkActive="selected">
              <ion-icon aria-hidden="true" slot="start" [ios]="p.icon + '-outline'" [md]="p.icon + ''"></ion-icon>
              <ion-label>{{ p.title }}</ion-label>
            </ion-item>
            }

            <ion-item (click)="logout()" lines="none" detail="false" style="cursor: pointer; margin-top: 20px">
              <ion-icon slot="start" name="exit-outline" color="danger"></ion-icon>
              <ion-label color="danger">Kirjaudu ulos</ion-label>
            </ion-item>
          </ion-menu-toggle>
        </ion-list>
      </ion-content>
    </ion-menu>


    <!-- if a http request is waiting for a response - show this -->
    @if (loadingService.loading$ | async) {
    <div id="loading-spinner-container">
      <app-loading-spinner></app-loading-spinner>
    </div>
    }
    <ion-router-outlet id="main-content"></ion-router-outlet>
  </ion-split-pane>

</ion-app>
