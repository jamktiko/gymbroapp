<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="end">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>Tilastot</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <div class="content-container">
    
    <!-- XP-KORTTI -->
    <div class="xp-wrapper">
      <div class="xp-header">
        <span class="level-text"></span>
        
      </div>
      <div class="progress-bar-container">
        <div class="progress-bar-fill" [style.width.%]="(xpService.progress$ | async)! * 100"></div>
      </div>
    </div>

    <!-- STREAK-KORTTI -->
    

<div class="user-stats-grid">
  <div class="user-stat-box">
    <small>Kokonais XP</small>
    <p>{{ userData?.xp || 0 }}</p>
  </div>

  <div class="user-stat-box">
    <small>Treenit</small>
    <p>{{ userData?.trainingSessions?.length || 0 }}</p>
  </div>

  <div class="user-stat-box full-width">
    <small>Jäsenenä alkaen</small>
    <p>{{ userData?.createdAt | date:'dd.MM.yyyy' }}</p>
  </div>
</div>

<ion-card class="streak-card">
      <ion-card-content>
        <div class="streak-header">
          <ion-icon name="flame" class="streak-flame"></ion-icon>
          <div class="streak-info">
            <h2>{{ streakData.current }} päivän putki!</h2>
            <p>Jatka samaan malliin!</p>
          </div>
        </div>

        <div class="days-grid">
          <div *ngFor="let d of streakData.weeklyActivity" class="day-dot">
            <ion-icon 
              [name]="d.active ? 'checkmark-circle' : 'ellipse-outline'"
              [color]="d.active ? 'success' : 'medium'">
            </ion-icon>
            <span [class.active-text]="d.active">{{ d.day }}</span>
          </div>
        </div>
      </ion-card-content>
    </ion-card>


  </div>
</ion-content>
