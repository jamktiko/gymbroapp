<ion-content class="ion-padding">
  <div class="login-container">
    <div class="logo-section">
      <h1>GymBro</h1>
      <p>Kirjaudu sisään jatkaaksesi</p>
    </div>

    <div class="logo-wrapper">
      <img src="assets/logoilmantaustaa.png" alt="Sovelluksen logo" />
    </div>

    <div class="action-section">
      <asl-google-signin-button
        type="standard"
        size="large"
      ></asl-google-signin-button>

      <!-- Fallback button for testing -->
      <ion-button
        expand="block"
        color="light"
        class="google-btn ion-margin-top"
        (click)="loginWithGoogle()"
      >
        <ion-icon slot="start" name="logo-google"></ion-icon>
        Test Login (Fallback)
      </ion-button>
    </div>

    <div class="footer-text">
      <p>Ainoa kirjautumisvaihtoehto turvallisuutesi takaamiseksi.</p>
      <a
        href="https://policies.google.com/privacy"
        target="_blank"
        rel="noopener noreferrer"
      >
        Tietosuojaseloste
      </a>
    </div>
  </div>
</ion-content>
