<ion-content [fullscreen]="true" class="ion-padding">
  <div class="login-container">
    <div class="logo-section">
      <h1>GymBro</h1>
      <p>Kirjaudu sisään jatkaaksesi</p>
    </div>
    <div class="logo-wrapper">
      <img src="assets/logoilmantaustaa.png" alt="Sovelluksen logo" />
    </div>
    <div class="action-section" style="display: flex; justify-content: center">
      <ion-button expand="block" class="google-btn" (click)="onGoogleLoginClick()">
        <ion-icon name="logo-google" slot="start"></ion-icon>
        Sign in with Google
      </ion-button>
    </div>

    <div class="footer-text">
      <p>Ainoa kirjautumisvaihtoehto turvallisuutesi takaamiseksi.</p>
      <a
        href="https://policies.google.com/privacy"
        target="_blank"
        rel="noopener noreferrer"
      >
        Tietosuojaseloste
      </a>
    </div>
  </div>
</ion-content>
