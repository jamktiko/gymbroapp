<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/page2"></ion-back-button>
    </ion-buttons>
    <ion-title>Uusi treeniohjelma</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <div class="content-container ion-padding">
    
    <ion-item lines="full" class="name-input-item">
      <ion-label position="stacked">OHJELMAN NIMI</ion-label>
      <ion-input 
        [(ngModel)]="programName" 
        type="text" 
        placeholder="esim. Jalkapäivä">
      </ion-input>
    </ion-item>

    <h3 class="selection-title">VALITSE HARJOITTEET</h3>
    
    <ion-accordion-group>
      <ion-accordion *ngFor="let category of exerciseList" [value]="category.title">
        
        <ion-item slot="header" color="light">
          <ion-label><strong>{{ category.title }}</strong></ion-label>
        </ion-item>
        
        <div class="ion-no-padding" slot="content">
          <ion-item 
            *ngFor="let exercise of category.exercises" 
            (click)="toggleSelection(exercise)" 
            lines="full" 
            button="true"
            class="exercise-item">
            
            <ion-checkbox 
              [checked]="exercise.isSelected" 
              slot="start" 
              (click)="$event.stopPropagation()">
            </ion-checkbox>
            
            <ion-label class="exercise-label">{{ exercise.name }}</ion-label>

            <div slot="end" *ngIf="exercise.isSelected" class="stats-container" (click)="$event.stopPropagation()">
              
              <div class="stat-group">
                <ion-input 
                  type="number" 
                  [(ngModel)]="exercise.sets" 
                  class="small-input" 
                  placeholder="0">
                </ion-input>
                <span class="unit">S</span>
              </div>

              <span class="separator">x</span>

              <div class="stat-group">
                <ion-input 
                  type="number" 
                  [(ngModel)]="exercise.reps" 
                  class="small-input" 
                  placeholder="0">
                </ion-input>
                <span class="unit">T</span>
              </div>

              <span class="separator"></span>

              <div class="stat-group weight-group">
                <ion-input 
                  type="number" 
                  [(ngModel)]="exercise.weight" 
                  class="small-input weight-input" 
                  placeholder="0">
                </ion-input>
                <span class="unit">kg</span>
              </div>
              
            </div>
            
          </ion-item>
        </div>
        
      </ion-accordion>
    </ion-accordion-group>

    <div class="ion-padding-top action-buttons">
      <ion-button expand="block" fill="outline" (click)="openCustomExercise()">
        <ion-icon name="add-outline" slot="start"></ion-icon>
        Luo uusi liike
      </ion-button>

      <ion-button 
        expand="block" 
        color="primary" 
        (click)="saveProgram()"
        [disabled]="programName.trim().length === 0">
        Tallenna ohjelma
      </ion-button>
    </div>
    
  </div>
</ion-content>
